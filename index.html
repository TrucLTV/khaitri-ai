<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KhaiTriAI — Nền tảng dạy học AI lớp 10</title>
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = '/' + params[0].split('=')[1];
          var query = params[1] ? '?' + params[1].split('=').slice(1).join('=') : '';
          window.history.replaceState(null, null,
            l.pathname + path + query + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
